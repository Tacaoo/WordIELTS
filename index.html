<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>WordIELTS - Erca Hoca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0f0f13;--sf:#1a1a24;--sf2:#22222e;--bd:#2a2a38;--tx:#f0efff;--sub:#8888aa;--acc:#7c5cfc;--gr:#10b981;--am:#f59e0b;--rd:#ef4444;--nav:#13131a;}
.light{--bg:#f8f7f4;--sf:#fff;--sf2:#f0eff8;--bd:#e5e4f0;--tx:#1a1a2e;--sub:#666688;--nav:#fff;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);background:var(--nav);position:sticky;top:0;z-index:10;}
.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.streak{display:flex;align-items:center;gap:4px;background:#1f1500;border:1px solid #3d2800;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;color:#f59e0b;}
.light .streak{background:#fff7e6;border-color:#fbbf24;}
nav{display:flex;background:var(--nav);border-top:1px solid var(--bd);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:10;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;gap:3px;color:var(--sub);font-size:9px;font-weight:500;border:none;background:none;}
.ni.active{color:var(--acc);font-weight:700;}
.ni svg{width:20px;height:20px;}
main{flex:1;overflow-y:auto;padding:12px 12px 76px;}
.pb{background:var(--sf);border-radius:16px;padding:12px;margin-bottom:10px;border:1px solid var(--bd);}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.pl{font-size:11px;color:var(--sub);}
.pv{font-size:11px;font-weight:700;}
.pbar{height:6px;border-radius:99px;background:var(--sf2);overflow:hidden;margin-bottom:8px;}
.pfill{height:100%;border-radius:99px;transition:width .5s;}
.cw{perspective:1200px;margin-bottom:12px;transition:opacity .22s,transform .22s;}
.cw.exit{opacity:0;transform:scale(.94) translateY(8px);}
.ci{position:relative;height:420px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.34,1.2,.64,1);}
.ci.flip{transform:rotateY(180deg);}
.cf{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;overflow:hidden;}
/* ON YUZ */
.front{display:flex;flex-direction:column;padding:14px;}
.ftop{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.fimg{width:72px;height:72px;border-radius:14px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,0.2);}
.fwb{flex:1;}
.fw{font-size:20px;font-weight:800;color:#fff;line-height:1.2;}
.ftag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-top:4px;}
.fdiv{height:1px;background:rgba(255,255,255,0.15);margin-bottom:8px;}
/* Es/Zit - on yuz */
.sarow{display:flex;gap:8px;margin-bottom:8px;}
.sabox{flex:1;border-radius:12px;padding:8px 10px;}
.syn{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);}
.ant{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);}
.salbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.slbl{color:#10b981;}
.albl{color:#ef4444;}
.saw{font-size:13px;font-weight:800;color:#fff;}
.saex{font-size:10px;color:rgba(255,255,255,0.6);font-style:italic;margin-top:2px;line-height:1.4;}
.flbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.45);margin-bottom:4px;}
.fs{font-size:12px;line-height:1.6;color:rgba(255,255,255,0.88);font-style:italic;margin-bottom:3px;}
.hint{font-size:10px;color:rgba(255,255,255,0.35);margin-top:auto;padding-top:5px;text-align:center;}
/* ARKA YUZ */
.back{transform:rotateY(180deg);background:var(--sf);border:1px solid var(--bd);display:flex;flex-direction:column;padding:16px;overflow-y:auto;gap:0;}
.bm{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:10px;}
.bl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:4px;}
.be{font-size:12px;font-style:italic;color:var(--tx);line-height:1.6;}
.bt{font-size:11px;color:var(--sub);margin-bottom:7px;line-height:1.5;}
.bdv{height:1px;background:var(--bd);margin:8px 0;}
/* Butonlar */
.brow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn{border-radius:14px;padding:11px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;border:1.5px solid;outline:none;}
.bg{color:#10b981;background:#10b98118;border-color:#10b98144;}
.ba{color:#f59e0b;background:#f59e0b18;border-color:#f59e0b44;}
.br{color:#ef4444;background:#ef444418;border-color:#ef444444;}
/* Liste */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px;}
.sn{font-size:26px;font-weight:800;letter-spacing:-1px;}
.sl{font-size:11px;color:var(--sub);}
.wl{display:flex;flex-direction:column;gap:7px;}
.wi{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px;}
.wimg{width:36px;height:36px;border-radius:8px;object-fit:cover;}
.wen{font-weight:700;font-size:13px;}
.wtr{font-size:10px;color:var(--sub);margin-top:1px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.stit{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.sr{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;}
.tgl{width:42px;height:22px;border-radius:11px;position:relative;transition:background .2s;cursor:pointer;border:none;outline:none;}
.tk{position:absolute;top:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.gi{width:100%;padding:10px 12px;border-radius:10px;font-size:16px;font-weight:700;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);outline:none;}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.md{background:var(--sf);border-radius:20px;padding:20px;width:100%;max-width:300px;border:1px solid var(--bd);}
.mt{font-size:16px;font-weight:800;margin-bottom:12px;}
.mbs{display:flex;gap:10px;margin-top:12px;}
.mb2{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.fr{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.fb{padding:5px 12px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--sub);}
.fb.act{background:var(--acc);border-color:var(--acc);color:#fff;}
.gdb{font-size:10px;color:var(--gr);font-weight:700;background:#10b98118;border:1px solid #10b98133;border-radius:99px;padding:3px 8px;}
</style>
</head>

  <div class="logo">WordIELTS - Erca Hoca</div>
  <div style="display:flex;align-items:center;gap:8px;">

  </div>

  <button class="ni" onclick="st('settings')" id="t-settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.33 13.53M4.93 19.07a10 10 0 0 1-1.33-13.53M19.07 19.07a10 10 0 0 1-13.53 1.33M4.93 4.93a10 10 0 0 1 13.53-1.33"/></svg>Ayarlar</button>
</nav>

</div>

// Canvas ile fotografi kes
const _cache = {};
function getImg(cardId) {
  if (_cache[cardId]) return _cache[cardId];
  const m = IMG_MAP[cardId];
  if (!m) return null;
  const img = new Image();
  img.src = m.f;
  const canvas = document.createElement('canvas');
  canvas.width = 90; canvas.height = 90;
  const ctx = canvas.getContext('2d');
  img.onload = () => {
    const cw = img.naturalWidth / m.tc;
    const ch = img.naturalHeight / m.tr;
    ctx.drawImage(img, m.c * cw, m.r * ch, cw, ch, 0, 0, 90, 90);
    _cache[cardId] = canvas.toDataURL('image/webp', 0.7);
    // Ekranda olan karti yenile
    const el = document.querySelector(`img[data-cid="${cardId}"]`);
    if (el) el.src = _cache[cardId];
  };
  return null;
}

// Fotograf on yukle
function preload() {
  const loaded = {};
  Object.values(IMG_MAP).forEach(m => {
    if (!loaded[m.f]) {
      loaded[m.f] = true;
      const img = new Image();
      img.src = m.f;
    }
  });
}

const KEY="wi_v5";
let S=loadS(),cur=null,tab="study",flip=false,filt="all";
function loadS(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch{}return{l:[],r:[],s:[],si:{},st:0,ld:null,dg:10,dc:0,dd:td(),dm:true};}
function saveS(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function td(){return new Date().toISOString().split("T")[0];}
function pd(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0];}
if(S.dd!==td()){if(S.ld!==pd())S.st=0;S.dd=td();S.dc=0;saveS();}

function pool(){const ls=new Set(S.l);const av=CARDS.filter(c=>!ls.has(c.id));if(!av.length)return CARDS;const p=[];for(const c of av){p.push(c);if(S.s.includes(c.id))p.push(c);}return p;}

function next(){const p=pool();cur=p[Math.floor(Math.random()*p.length)];flip=false;rStudy();}

function markL(){anim(()=>{S.l=[...new Set([...S.l,cur.id])];S.r=S.r.filter(i=>i!==cur.id);S.s=S.s.filter(i=>i!==cur.id);S.dc++;S.st=S.ld===td()?S.st:(S.ld===pd()?S.st+1:1);S.ld=td();saveS();uh();next();});}
function markR(){anim(()=>{S.r=[...new Set([...S.r,cur.id])];S.dc++;S.ld=td();saveS();uh();next();});}
function markS(){anim(()=>{S.s=[...new Set([...S.s,cur.id])];const i=((S.si[cur.id]||0)+1)%cur.length;S.si[cur.id]=i;S.dc++;S.ld=td();saveS();uh();next();});}

function anim(fn){const w=document.getElementById("cw");if(w){w.classList.add("exit");setTimeout(fn,240);}else fn();}
function uh(){document.getElementById("sc").textContent=S.st;document.getElementById("gdb").style.display=S.dc>=S.dg?"block":"none";}
function st(t){tab=t;filt="all";document.querySelectorAll(".ni").forEach(e=>e.classList.remove("active"));document.getElementById("t-"+t).classList.add("active");render();}
function render(){if(tab==="study")rStudy();else if(tab==="learned")rList("l");else if(tab==="review")rList("r");else if(tab==="struggling")rList("s");else if(tab==="stats")rStats();else if(tab==="settings")rSettings();}

function imgTag(id,cls){
  const b=_cache[id];
  if(b)return `<img src="${b}" class="${cls}" data-cid="${id}">`;
  getImg(id);
  return `<img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" class="${cls}" data-cid="${id}" style="background:rgba(255,255,255,0.1)">`;
}

function rStudy(){
  if(!cur){next();return;}
  const pp=Math.round((S.l.length/CARDS.length)*100);
  const gp=Math.min(100,Math.round((S.dc/S.dg)*100));
  const ip=cur.tp==="pattern";
  const tc=ip?"#818cf8":"#10b981";
  const tb=ip?"rgba(99,102,241,0.15)":"rgba(16,185,129,0.15)";
  const tl=ip?"Kalip":"Kelime";
  document.getElementById("mc").innerHTML=`
<div class="pb">
<div class="pr"><span class="pl">Genel Ilerleme</span><span class="pv" style="color:var(--acc)">${pp}%</span></div>
<div class="pbar"><div class="pfill" style="width:${pp}%;background:linear-gradient(90deg,var(--acc),#a78bfa)"></div></div>
<div class="pr"><span class="pl">Gunluk Hedef (${S.dc}/${S.dg})</span><span class="pv" style="color:var(--gr)">${gp}%</span></div>
<div class="pbar"><div class="pfill" style="width:${gp}%;background:linear-gradient(90deg,var(--gr),#34d399)"></div></div>
</div>
<div class="cw" id="cw">
<div class="ci ${flip?"flip":""}" id="ci" onclick="doFlip()">
<div class="cf front" style="background:linear-gradient(145deg,${cur.c}28,${cur.c}50);border:1px solid ${cur.c}55;">
  <div class="ftop">
    ${imgTag(cur.id,"fimg")}
    <div class="fwb">
      <span class="ftag" style="background:${tb};color:${tc};border:1px solid ${tc}44">${tl}</span>
      <div class="fw">${cur.w}</div>
    </div>
  </div>
  <div class="fdiv"></div>
  <div class="sarow">
    <div class="sabox syn">
      <div class="salbl slbl">Es Anlam</div>
      <div class="saw">${cur.sw}</div>
      <div class="saex">"${cur.se}"</div>
    </div>
    <div class="sabox ant">
      <div class="salbl albl">Zit Anlam</div>
      <div class="saw">${cur.aw}</div>
      <div class="saex">"${cur.ae}"</div>
    </div>
  </div>
  <div class="flbl">Ornek Cumleler</div>
  <div class="fs">"${cur.e}"</div>
  <div class="fs">"${cur.e2}"</div>
  <div class="hint">Turkce icin cevir</div>
</div>
<div class="cf back">
  <div class="bl">Turkce Anlami</div>
  <div class="bm">${cur.tr}</div>
  <div class="bdv"></div>
  <div class="bl">Cumle Cevirileri</div>
  <div class="be">"${cur.e}"</div>
  <div class="bt">= ${cur.t}</div>
  <div class="be">"${cur.e2}"</div>
  <div class="bt">= ${cur.t2}</div>
</div>
</div>
</div>
<div class="brow">
<button class="btn bg" onclick="markL()">V<br>Ogrend.</button>
<button class="btn ba" onclick="markR()">R<br>Tekrar</button>
<button class="btn br" onclick="markS()">X<br>Zorlandi</button>
</div>`;
  preload();
}

function doFlip(){flip=!flip;const i=document.getElementById("ci");if(i)i.classList.toggle("flip",flip);}

function rList(tp){
  const tt={l:"Ogrenilenler",r:"Tekrar",s:"Zorlandiklarim"};
  const cl={l:"var(--gr)",r:"var(--am)",s:"var(--rd)"};
  const ids=S[tp];
  const all=CARDS.filter(c=>ids.includes(c.id));
  const ws=all.filter(c=>c.tp==="word");
  const ps=all.filter(c=>c.tp==="pattern");
  const fil=filt==="word"?ws:filt==="pattern"?ps:all;
  document.getElementById("mc").innerHTML=`
<div class="stit">${tt[tp]} (${ids.length})</div>
<div class="fr">
<button class="fb ${filt==="all"?"act":""}" onclick="sf('all')">Tumu (${all.length})</button>
<button class="fb ${filt==="word"?"act":""}" onclick="sf('word')">Kelime (${ws.length})</button>
<button class="fb ${filt==="pattern"?"act":""}" onclick="sf('pattern')">Kalip (${ps.length})</button>
</div>
${fil.length===0?`<div class="empty"><div style="font-size:40px;margin-bottom:10px">📭</div><div>Henuz kelime yok</div></div>`
:`<div class="wl">${fil.map(c=>`
<div class="wi">
  ${imgTag(c.id,"wimg")}
  <div style="flex:1"><div class="wen" style="color:${c.c}">${c.w}</div><div class="wtr">${c.tr}</div></div>
  <div class="dot" style="background:${cl[tp]}"></div>
</div>`).join("")}</div>`}`;
}

function sf(f){filt=f;rList(tab);}

function rStats(){
  const pp=Math.round((S.l.length/CARDS.length)*100);
  document.getElementById("mc").innerHTML=`
<div class="sg">
  <div class="sc"><div style="font-size:22px">✅</div><div class="sn" style="color:var(--gr)">${S.l.length}</div><div class="sl">Ogrenilenler</div></div>
  <div class="sc"><div style="font-size:22px">🔄</div><div class="sn" style="color:var(--am)">${S.r.length}</div><div class="sl">Tekrar</div></div>
  <div class="sc"><div style="font-size:22px">💪</div><div class="sn" style="color:var(--rd)">${S.s.length}</div><div class="sl">Zorlandi</div></div>
  <div class="sc"><div style="font-size:22px">🔥</div><div class="sn" style="color:#f97316">${S.st}</div><div class="sl">Gun Serisi</div></div>
</div>
<div class="pb">
  <div style="font-weight:700;font-size:14px;margin-bottom:10px">Toplam Ilerleme</div>
  <div class="pr"><span class="pl">${S.l.length}/${CARDS.length}</span><span class="pv" style="color:var(--acc)">${pp}%</span></div>
  <div class="pbar"><div class="pfill" style="width:${pp}%;background:linear-gradient(90deg,var(--acc),#a78bfa)"></div></div>
  <div style="margin-top:12px;display:flex;flex-direction:column;gap:6px">
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">Toplam kart</span><strong>${CARDS.length}</strong></div>
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">Kelimeler</span><strong>${CARDS.filter(c=>c.tp==="word").length}</strong></div>
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">Kaliplar</span><strong>${CARDS.filter(c=>c.tp==="pattern").length}</strong></div>
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">Bugun</span><strong>${S.dc} kart</strong></div>
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">Hedef</span><strong>${S.dg} kart</strong></div>
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--sub)">Kaynak</span><strong>Erca Hoca</strong></div>
  </div>
</div>`;
}

function rSettings(){
  document.getElementById("mc").innerHTML=`
<div class="sr" onclick="togDark()">
  <span style="font-size:14px;font-weight:600">${S.dm?"Karanlik Mod":"Aydinlik Mod"}</span>
  <div class="tgl" style="background:${S.dm?"var(--acc)":"var(--sf2)"}"><div class="tk" style="left:${S.dm?"22px":"2px"}"></div></div>
</div>
<div class="sr" onclick="openM()">
  <span style="font-size:14px;font-weight:600">Gunluk Hedef</span>
  <span style="font-weight:700;color:var(--acc)">${S.dg} kart</span>
</div>
<div class="sr" onclick="resetAll()">
  <span style="font-size:14px;font-weight:600;color:var(--rd)">Ilerlemeyi Sifirla</span>
</div>
<div class="pb" style="margin-top:8px">
  <div style="font-weight:700;font-size:12px;color:var(--sub);margin-bottom:8px">BILGI</div>
  <div style="font-size:13px;color:var(--sub);line-height:2">
    Toplam: <strong style="color:var(--tx)">${CARDS.length} kart</strong><br>
    Kelime: <strong style="color:var(--tx)">${CARDS.filter(c=>c.tp==="word").length}</strong><br>
    Kalip: <strong style="color:var(--tx)">${CARDS.filter(c=>c.tp==="pattern").length}</strong><br>
    Kaynak: <strong style="color:var(--tx)">Erca Hoca Kelime Kitabi</strong>
  </div>
</div>`;
}

function togDark(){S.dm=!S.dm;document.body.classList.toggle("light",!S.dm);saveS();rSettings();}
function openM(){document.getElementById("gi").value=S.dg;document.getElementById("modal").style.display="flex";}
function closeM(){document.getElementById("modal").style.display="none";}
function saveG(){const v=parseInt(document.getElementById("gi").value);if(v>0&&v<=200){S.dg=v;saveS();}closeM();if(tab==="settings")rSettings();}
function resetAll(){if(confirm("Tum ilerleme silinecek. Emin misiniz?")){S={l:[],r:[],s:[],si:{},st:0,ld:null,dg:S.dg,dc:0,dd:td(),dm:S.dm};saveS();cur=null;uh();st("study");}}

if(!S.dm)document.body.classList.add("light");
uh();
next();

</script>
</body>
</html>
