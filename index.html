<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>WordIELTS</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg:#0f0f13;--surface:#1a1a24;--surface2:#22222e;--border:#2a2a38;
    --text:#f0efff;--sub:#8888aa;--accent:#7c5cfc;--green:#10b981;
    --amber:#f59e0b;--red:#ef4444;--nav:#13131a;
  }
  .light{
    --bg:#f8f7f4;--surface:#ffffff;--surface2:#f0eff8;--border:#e5e4f0;
    --text:#1a1a2e;--sub:#666688;--nav:#ffffff;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
  header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--nav);position:sticky;top:0;z-index:10;}
  .logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .streak{display:flex;align-items:center;gap:4px;background:#1f1500;border:1px solid #3d2800;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;color:#f59e0b;}
  .light .streak{background:#fff7e6;border-color:#fbbf24;}
  nav{display:flex;background:var(--nav);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:10;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;gap:3px;color:var(--sub);font-size:10px;font-weight:500;border:none;background:none;}
  .nav-item.active{color:var(--accent);font-weight:700;}
  .nav-item svg{width:20px;height:20px;}
  main{flex:1;overflow-y:auto;padding:14px 14px 80px;}
  .progress-box{background:var(--surface);border-radius:18px;padding:14px;margin-bottom:12px;border:1px solid var(--border);}
  .prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .prog-label{font-size:12px;color:var(--sub);}
  .prog-val{font-size:12px;font-weight:700;}
  .prog-bar{height:7px;border-radius:99px;background:var(--surface2);overflow:hidden;margin-bottom:10px;}
  .prog-fill{height:100%;border-radius:99px;transition:width .5s ease;}
  .card-wrap{perspective:1000px;margin-bottom:14px;transition:opacity .25s,transform .25s;}
  .card-wrap.exit{opacity:0;transform:scale(.94) translateY(8px);}
  .card-inner{position:relative;min-height:300px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.34,1.56,.64,1);}
  .card-inner.flipped{transform:rotateY(180deg);}
  .card-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;overflow:hidden;}
  .card-front{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;gap:14px;}
  .card-back{transform:rotateY(180deg);background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;padding:24px;gap:12px;}
  .emoji-box{font-size:48px;width:88px;height:88px;border-radius:20px;display:flex;align-items:center;justify-content:center;}
  .word-text{font-size:30px;font-weight:800;letter-spacing:-1px;text-align:center;}
  .tap-hint{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:4px;margin-top:6px;}
  .meaning{font-size:24px;font-weight:800;letter-spacing:-.5px;color:var(--accent);}
  .card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);}
  .example-en{font-size:14px;line-height:1.6;font-style:italic;}
  .example-tr{font-size:12px;line-height:1.6;color:var(--sub);}
  .divider{height:1px;background:var(--border);}
  .tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:4px;}
  .btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
  .btn{border-radius:14px;padding:12px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11px;font-weight:700;transition:all .15s;outline:none;border:1.5px solid;}
  .btn-green{color:var(--green);background:#10b98118;border-color:#10b98144;}
  .btn-amber{color:var(--amber);background:#f59e0b18;border-color:#f59e0b44;}
  .btn-red{color:var(--red);background:#ef444418;border-color:#ef444444;}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;}
  .stat-num{font-size:26px;font-weight:800;letter-spacing:-1px;}
  .stat-lbl{font-size:11px;color:var(--sub);}
  .word-list{display:flex;flex-direction:column;gap:8px;}
  .word-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:10px;}
  .word-emoji{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
  .word-en{font-weight:700;font-size:14px;}
  .word-tr{font-size:11px;color:var(--sub);margin-top:1px;}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .empty{text-align:center;padding:48px 20px;color:var(--sub);}
  .empty-icon{font-size:40px;margin-bottom:10px;}
  .section-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .setting-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;cursor:pointer;}
  .setting-label{font-size:14px;font-weight:600;}
  .toggle{width:42px;height:22px;border-radius:11px;position:relative;transition:background .2s;cursor:pointer;border:none;outline:none;}
  .toggle-knob{position:absolute;top:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
  .goal-input{width:100%;padding:11px 14px;border-radius:11px;font-size:16px;font-weight:700;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);outline:none;box-sizing:border-box;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--surface);border-radius:22px;padding:22px;width:100%;max-width:320px;border:1px solid var(--border);}
  .modal-title{font-size:17px;font-weight:800;margin-bottom:14px;}
  .modal-btns{display:flex;gap:10px;margin-top:14px;}
  .modal-btn{flex:1;padding:11px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
  .filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
  .filter-btn{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--sub);}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .goal-done{font-size:11px;color:var(--green);font-weight:700;background:#10b98118;border:1px solid #10b98133;border-radius:99px;padding:3px 8px;}
</style>
</head>
<body>

<header>
  <div class="logo">WordIELTS</div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="goal-done-badge" class="goal-done" style="display:none">🎉 Hedef!</span>
    <div class="streak">🔥 <span id="streak-count">0</span> gün</div>
  </div>
</header>

<main id="main-content"></main>

<nav>
  <button class="nav-item active" onclick="switchTab('study')" id="tab-study">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    Çalış
  </button>
  <button class="nav-item" onclick="switchTab('learned')" id="tab-learned">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    Öğrendim
  </button>
  <button class="nav-item" onclick="switchTab('review')" id="tab-review">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    Tekrar
  </button>
  <button class="nav-item" onclick="switchTab('struggling')" id="tab-struggling">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Zorlandım
  </button>
  <button class="nav-item" onclick="switchTab('stats')" id="tab-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    İstatistik
  </button>
  <button class="nav-item" onclick="switchTab('settings')" id="tab-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.33 13.53M4.93 19.07a10 10 0 0 1-1.33-13.53M19.07 19.07a10 10 0 0 1-13.53 1.33M4.93 4.93a10 10 0 0 1 13.53-1.33"/></svg>
    Ayarlar
  </button>
</nav>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Günlük Hedef</div>
    <input class="goal-input" type="number" id="goal-input" min="1" max="200" value="10"/>
    <div class="modal-btns">
      <button class="modal-btn" style="background:var(--surface2);color:var(--text);" onclick="closeModal()">İptal</button>
      <button class="modal-btn" style="background:var(--accent);color:#fff;" onclick="saveGoal()">Kaydet</button>
    </div>
  </div>
</div>
