.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.streak{display:flex;align-items:center;gap:4px;background:#fff7e6;border:1px solid #fbbf24;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;color:#f59e0b;}
.dark .streak{background:#1f1500;border-color:#3d2800;}
nav{display:flex;background:var(--nav);border-top:1px solid var(--bd);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:10;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;gap:4px;color:var(--sub);font-size:13px;font-weight:600;border:none;background:none;}
.ni.active{color:var(--acc);font-weight:700;}
.ni svg{width:24px;height:24px;}
main{flex:1;overflow-y:auto;padding:12px 12px 76px;}
.pb{background:var(--sf);border-radius:16px;padding:12px;margin-bottom:10px;border:1px solid var(--bd);}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.pl{font-size:18px;color:var(--sub);}
.pv{font-size:18px;font-weight:700;}
.pbar{height:6px;border-radius:99px;background:var(--sf2);overflow:hidden;margin-bottom:8px;}
.pfill{height:100%;border-radius:99px;transition:width .5s;}
.cw{perspective:1200px;margin-bottom:12px;transition:opacity .22s,transform .22s;}
.cw.exit{opacity:0;transform:scale(.94) translateY(8px);}
.ci{position:relative;height:570px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.34,1.2,.64,1);}
.ci.flip{transform:rotateY(180deg);}
.cf{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;overflow:hidden;}
/* ON YUZ */
.front{display:flex;flex-direction:column;align-items:center;padding:16px 14px;overflow-y:auto;}
.ftop{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px;width:100%;}
.fimg{width:130px;height:130px;border-radius:20px;object-fit:cover;flex-shrink:0;border:3px solid rgba(255,255,255,0.35);box-shadow:0 6px 18px rgba(0,0,0,0.15);}
.fwb{flex:none;text-align:center;display:flex;flex-direction:column;align-items:center;}
.fw{font-size:40px;font-weight:800;color:#fff;line-height:1.15;}
.ftag{display:inline-block;font-size:15px;font-weight:700;padding:4px 14px;border-radius:99px;margin-bottom:7px;}
.fdiv{height:1px;background:rgba(255,255,255,0.18);margin-bottom:10px;width:100%;}
/* Es/Zit - on yuz */
.sarow{display:flex;gap:8px;margin-bottom:10px;width:100%;}
.sabox{flex:1;border-radius:14px;padding:10px 12px;}
.syn{background:rgba(255,255,255,0.18);border:1.5px solid rgba(255,255,255,0.35);}
.ant{background:rgba(0,0,0,0.18);border:1.5px solid rgba(255,255,255,0.25);}
.salbl{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.slbl{color:#d1fae5;}
.albl{color:#fecaca;}
.saw{font-size:26px;font-weight:800;color:#fff;}
.saex{font-size:15px;color:rgba(255,255,255,0.85);font-style:italic;margin-top:4px;line-height:1.45;}
.flbl{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.8);margin-bottom:6px;width:100%;}
.fs{font-size:20px;line-height:1.65;color:rgba(255,255,255,0.95);font-style:italic;margin-bottom:8px;width:100%;}
.hint{font-size:14px;color:rgba(255,255,255,0.7);margin-top:auto;padding-top:10px;text-align:center;width:100%;}
/* ARKA YUZ */
.back{transform:rotateY(180deg);background:var(--sf);border:1px solid var(--bd);display:flex;flex-direction:column;padding:16px;overflow-y:auto;gap:0;height:100%;}
.bm{font-size:34px;font-weight:800;color:var(--acc);margin-bottom:12px;}
.syn2{background:rgba(16,185,129,0.12);border:1.5px solid rgba(16,185,129,0.45);}
.ant2{background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.45);}
.slbl2{color:#059669;}
.albl2{color:#dc2626;}
.saw2{font-size:22px;font-weight:800;color:var(--tx);}
.saex2{font-size:14px;color:var(--sub);font-style:italic;margin-top:4px;line-height:1.45;}
.bl{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:6px;}
.be{font-size:19px;font-style:italic;color:var(--tx);line-height:1.6;}
.bt{font-size:17px;color:var(--sub);margin-bottom:10px;line-height:1.55;}
.bdv{height:1px;background:var(--bd);margin:8px 0;}
/* Butonlar */
.brow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn{border-radius:16px;padding:16px 4px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid;outline:none;}
.btn svg{width:30px;height:30px;}
.bg{color:#fff;background:#10b981;border-color:#0d9268;}
.ba{color:#fff;background:#f59e0b;border-color:#d18509;}
.br{color:#fff;background:#ef4444;border-color:#c93232;}
/* Liste */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px;}
.sc.clk{cursor:pointer;transition:transform .1s,border-color .15s;}
.sc.clk:active{transform:scale(0.96);border-color:var(--acc);}
.backb{background:none;border:none;color:var(--acc);font-size:15px;font-weight:700;font-family:inherit;padding:4px 0;margin-bottom:10px;cursor:pointer;}
.sn{font-size:26px;font-weight:800;letter-spacing:-1px;}
.sl{font-size:14px;color:var(--sub);}
.wl{display:flex;flex-direction:column;gap:7px;}
.wi{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px;}
.fimg.emojibox{font-size:64px;}
.wimg.emojibox{font-size:22px;}
.wimg{width:36px;height:36px;border-radius:8px;object-fit:cover;}
.wen{font-weight:700;font-size:18px;}
.wtr{font-size:15px;color:var(--sub);margin-top:2px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.stit{font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.sr{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;}
.tgl{width:42px;height:22px;border-radius:11px;position:relative;transition:background .2s;cursor:pointer;border:none;outline:none;}
.tk{position:absolute;top:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.gi{width:100%;padding:10px 12px;border-radius:10px;font-size:16px;font-weight:700;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);outline:none;}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.md{background:var(--sf);border-radius:20px;padding:20px;width:100%;max-width:300px;border:1px solid var(--bd);}
.mt{font-size:16px;font-weight:800;margin-bottom:12px;}
.mbs{display:flex;gap:10px;margin-top:12px;}
.mb2{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.fr{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.fb{padding:7px 14px;border-radius:99px;font-size:13px;font-weight:700;white-space:nowrap;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--sub);}
.fb.act{background:var(--acc);border-color:var(--acc);color:#fff;}
.gdb{font-size:10px;color:var(--gr);font-weight:700;background:#10b98118;border:1px solid #10b98133;border-radius:99px;padding:3px 8px;}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.qscore{font-size:14px;font-weight:700;color:var(--acc);background:var(--sf2);padding:6px 14px;border-radius:99px;}
.qcard{background:linear-gradient(150deg,var(--acc),#a78bfa);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:18px;box-shadow:0 8px 24px rgba(124,92,252,0.3);}
.qlbl{font-size:13px;color:rgba(255,255,255,0.85);font-weight:600;margin-bottom:12px;}
.qtr{font-size:30px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:16px;}
.qspeak{background:rgba(255,255,255,0.25);border:none;color:#fff;font-family:inherit;font-size:15px;font-weight:700;padding:8px 20px;border-radius:99px;cursor:pointer;}
.qspeak:active{background:rgba(255,255,255,0.4);}
.qopts{display:flex;flex-direction:column;gap:12px;}
.qopt{background:var(--sf);border:2px solid var(--bd);border-radius:16px;padding:18px;font-family:inherit;font-size:18px;font-weight:700;color:var(--tx);cursor:pointer;text-align:center;transition:transform .1s,border-color .15s;}
.qopt:active{transform:scale(0.98);}
.qopt.disabled{pointer-events:none;}
.qopt.qright{background:rgba(16,185,129,0.18);border-color:var(--gr);color:var(--gr);}
.qopt.qwrong{background:rgba(239,68,68,0.18);border-color:var(--rd);color:var(--rd);}
.qresult{text-align:center;font-size:18px;font-weight:800;margin:20px 0 14px;}
.qok{color:var(--gr);}
.qno{color:var(--rd);}
.qnext{width:100%;background:var(--acc);border:none;color:#fff;font-family:inherit;font-size:17px;font-weight:700;padding:16px;border-radius:16px;cursor:pointer;}
.qnext:active{opacity:0.85;}
.cspeak{background:rgba(255,255,255,0.22);border:none;color:#fff;width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;}
.cspeak:active{background:rgba(255,255,255,0.4);}
.bspeak{background:var(--sf2);border:1px solid var(--bd);color:var(--acc);width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;vertical-align:middle;margin-left:6px;}
.dlist{display:flex;flex-direction:column;gap:12px;}
.dcard{display:flex;align-items:center;gap:14px;background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;cursor:pointer;transition:transform .1s,border-color .15s;}
.dcard:active{transform:scale(0.98);border-color:var(--acc);}
.dnum{width:38px;height:38px;border-radius:50%;background:var(--acc);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0;}
.dt{font-size:17px;font-weight:800;color:var(--tx);}
.dtr{font-size:13px;color:var(--sub);margin-top:2px;}
.dmeta{font-size:12px;color:var(--acc);margin-top:4px;}
.darrow{font-size:22px;color:var(--sub);}
.dhead{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:14px;}
.dplayall{margin-top:10px;background:var(--acc);border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:700;padding:8px 18px;border-radius:99px;cursor:pointer;}
.dplayall:active{opacity:0.85;}
.dlines{display:flex;flex-direction:column;gap:14px;padding-bottom:20px;}
.dline{display:flex;flex-direction:column;max-width:88%;}
.dline.side1{align-self:flex-end;align-items:flex-end;}
.dspk{font-size:12px;font-weight:700;color:var(--acc);margin-bottom:3px;padding:0 6px;}
.dbubble{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:12px 14px;display:flex;align-items:flex-start;gap:8px;}
.side1 .dbubble{background:var(--acc);}
.side1 .dtext{color:#fff;}
.side1 .dword{color:#fff;text-decoration-color:rgba(255,255,255,0.6);}
.dtext{font-size:16px;line-height:1.55;color:var(--tx);}
.dtr-line{font-size:14px;line-height:1.5;color:var(--sub);margin-top:8px;padding-top:8px;border-top:1px dashed var(--bd);font-style:italic;}
.side1 .dtr-line{color:rgba(255,255,255,0.85);border-top-color:rgba(255,255,255,0.3);}
.dword{color:var(--acc);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;cursor:pointer;font-weight:700;}
.dspeak{background:rgba(124,92,252,0.12);border:none;color:var(--acc);width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}

.wpop-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;}

</head>

const DIALOGS=[{"t":"The Wrong Coffee Order","tr":"Yanlis Kahve Siparisi","lines":[["Mert","Hey, Zeynep! You look a little annoyed. What happened?","Hey Zeynep! Biraz sinirli gorunuyorsun. Ne oldu?"],["Zeynep","I just picked up my coffee, and they gave me the wrong order again.","Az once kahvemi aldim ve yine yanlis siparis verdiler."],["Mert","Seriously? What did you order?","Cidden mi? Ne siparis etmistin?"],["Zeynep","I ordered an iced latte with oat milk, but they gave me a hot cappuccino.","Yulaf sutlu soguk latte istedim ama sicak cappuccino verdiler."],["Mert","That's frustrating. Did you go back and tell them?","Bu sinir bozucu. Geri donup soyledin mi?"],["Zeynep","Yes, but the cafe was so crowded that I had to wait in line again.","Evet ama kafe o kadar kalabaliki ki yine sirada beklemek zorunda kaldim."],["Mert","I hate when that happens. Was the staff friendly at least?","Boyle olmasindan nefret ediyorum. En azindan personel guler yuzlu muydu?"],["Zeynep","Actually, yes. The employee apologized and offered me a free cookie.","Aslinda evet. Calisan ozur diledi ve bana bedava kurabiye teklif etti."],["Mert","Well, that's something! Did you accept it?","E, bu da bir sey! Kabul ettin mi?"],["Zeynep","Of course. I wasn't going to say no to a free cookie.","Tabii ki. Bedava kurabiyeye hayir diyecek degildim."],["Mert","Fair enough. By the way, have you noticed that coffee prices keep increasing?","Hakli sayilirsin. Bu arada, kahve fiyatlarinin surekli arttigini fark ettin mi?"],["Zeynep","Definitely. A few years ago, I could buy a coffee for half the price.","Kesinlikle. Birkac yil once yarivfiyatina kahve alabiliyordum."],["Mert","Same here. Sometimes I think about making coffee at home instead.","Bende oyle. Bazen onun yerine evde kahve yapmayi dusunuyorum."],["Zeynep","I tried that, but somehow cafe coffee always tastes better.","Denedim ama nedense kafe kahvesi her zaman daha guzel oluyor."],["Mert","Speaking of work, are you still working from home three days a week?","Is demisken, hala haftada uc gun evden mi calisiyorsun?"],["Zeynep","Yes, and I love it. I save a lot of time because I don't have to commute.","Evet ve bayiliyorum. Ise gidip gelmek zorunda olmadigim icin cok vakit kazaniyorum."],["Mert","What do you usually do during your lunch break?","Ogle aranda genelde ne yaparsin?"],["Zeynep","Sometimes I cook. Sometimes I watch a short video or take a walk.","Bazen yemek yaparim. Bazen kisa video izlerim ya da yuruyuse cikarim."],["Mert","That sounds relaxing.","Kulaga rahatlatici geliyor."],["Zeynep","It is. But working from home also has disadvantages. Sometimes I feel isolated. I miss chatting with coworkers.","Oyle. Ama evden calismanin dezavantajlari da var. Bazen kendimi yalniz hissediyorum. Is arkadaslariyla sohbeti ozluyorum."],["Mert","Are you free this weekend? A few friends are planning a picnic by the sea.","Bu hafta sonu musait misin? Birkac arkadas deniz kenarinda piknik planliyor."],["Zeynep","That sounds great! Count me in.","Harika olur! Ben de varim."],["Mert","Perfect. And don't worry, I promise not to order the wrong coffee for you.","Mukemmel. Merak etme, sana yanlis kahve siparis etmeyecegime soz veriyorum."],["Zeynep","Thanks. That's all I ask for!","Sagol. Tek istedigim bu zaten!"]]},{"t":"Returning a Product","tr":"Urun Iadesi","lines":[["Emma","Hi, I'd like to return this wireless speaker.","Merhaba, bu kablosuz hoparloru iade etmek istiyorum."],["Clerk","Of course. May I ask what the issue is?","Tabii. Sorunun ne oldugunu sorabilir miyim?"],["Emma","It doesn't seem to hold a charge. I charged it overnight, but the battery died after only an hour.","Sarji tutmuyor gibi. Gece boyu sarj ettim ama batarya sadece bir saatte bitti."],["Clerk","I'm sorry to hear that. Do you have the receipt?","Bunu duyduguma uzuldum. Fisiniz var mi?"],["Emma","Yes, I bought it three days ago. Here it is.","Evet, uc gun once aldim. Iste burada."],["Clerk","Thank you. Since it's within 14 days, we can offer a refund or a replacement.","Tesekkurler. 14 gun icinde oldugu icin para iadesi ya da degisim sunabiliriz."],["Emma","I'd prefer a replacement. I actually liked the sound quality.","Degisimi tercih ederim. Aslinda ses kalitesini begenmistim."],["Clerk","We have the same model in stock. Would you like me to bring one for you?","Ayni model stokta var. Size bir tane getirmemi ister misiniz?"],["Emma","Yes, please. Before I take it, could we test it to make sure it works properly?","Evet, lutfen. Almadan once duzgun calistigindan emin olmak icin test edebilir miyiz?"],["Clerk","Absolutely. That's a reasonable request.","Kesinlikle. Bu makul bir istek."],["Clerk","We've tested the new speaker, and everything seems to be working perfectly.","Yeni hoparloru test ettik, her sey mukemmel calisiyor gibi."],["Emma","Great. Thank you for your help.","Harika. Yardiminiz icin tesekkurler."],["Clerk","You're welcome. Is there anything else I can assist you with today?","Rica ederim. Bugun size baska nasil yardimci olabilirim?"],["Emma","Actually, yes. Do you sell protective carrying cases for this model?","Aslinda evet. Bu model icin koruyucu tasima kilifi satiyor musunuz?"],["Clerk","We do. They're on sale this week, next to the audio accessories section.","Evet. Bu hafta indirimdeler, ses aksesuarlari bolumunun yaninda."],["Emma","Perfect. I'll take a look before I leave.","Mukemmel. Ayrilmadan once bir goz atacagim."],["Clerk","Sounds good. Have a wonderful day!","Harika. Iyi gunler dilerim!"]]},{"t":"A Neighbor's Unexpected Visit","tr":"Komsunun Beklenmedik Ziyareti","lines":[["David","Knock, knock.","Tak tak."],["Sarah","Oh, hi David! I wasn't expecting any visitors today.","Aa, merhaba David! Bugun hic ziyaretci beklemiyordum."],["David","Sorry to drop by without calling first.","Once aramadan ugradigim icin ozur dilerim."],["Sarah","No worries. Is everything okay?","Onemli degil. Her sey yolunda mi?"],["David","Yes, everything's fine. I just wanted to ask you a favor.","Evet, her sey yolunda. Sadece senden bir iyilik isteyecektim."],["Sarah","Sure. What do you need?","Tabii. Neye ihtiyacin var?"],["David","I'm going out of town for three days, and I was wondering if you could keep an eye on my apartment.","Uc gunlugune sehir disina cikiyorum ve acaba daireme goz kulak olabilir misin diye dusunuyordum."],["Sarah","Of course. What exactly would you like me to do?","Tabii ki. Tam olarak ne yapmami istersin?"],["David","Mainly collect my mail and water the plants once or twice.","Genelde postalarimi toplaman ve bitkileri bir iki kez sulaman yeterli."],["Sarah","That shouldn't be a problem.","Bu sorun olmaz."],["David","Thanks. I really appreciate it.","Sagol. Gercekten minnettarim."],["Sarah","When are you leaving?","Ne zaman cikiyorsun?"],["David","Early tomorrow morning. My train leaves at 6 a.m. It's an important business trip.","Yarin sabah erkenden. Trenim sabah 6'da kalkiyor. Onemli bir is seyahati."],["Sarah","Where are you going?","Nereye gidiyorsun?"],["David","Chicago. I have a meeting with a potential client.","Chicago. Potansiyel bir musteriyle toplantim var."],["Sarah","Sounds exciting. I hope it goes well.","Heyecanli gorunuyor. Umarim iyi gecer."],["David","Me too. Thanks for the encouragement.","Ben de umuyorum. Cesaretlendirme icin tesekkurler."],["Sarah","No problem. By the way, do you have a spare key for me?","Sorun degil. Bu arada, bana verecek yedek anahtarin var mi?"],["David","Yes, I brought one with me.","Evet, yanimda bir tane getirdim."],["Sarah","Perfect. I'll take good care of everything.","Mukemmel. Her seye iyi bakarim."],["David","That's why I asked you. You're the most reliable neighbor I know.","Bu yuzden senden istedim. Tanidigim en guvenilir komsusun."],["Sarah","That's very kind of you to say.","Boyle demen cok nazik."],["David","Well, I'd better get going. I still have a lot of packing to do.","Neyse, artik gitsem iyi olacak. Hala yapacak cok valiz isim var."],["Sarah","Good luck with the trip, and don't worry about the apartment.","Seyahatte bol sans, daire icin de merak etme."]]},{"t":"Unexpected Guests at the Weekend","tr":"Hafta Sonu Beklenmedik Misafirler","lines":[["Emma","Hi, Jake! How was your weekend?","Selam Jake! Hafta sonun nasildi?"],["Jake","It was much more exciting than I expected.","Bekledigimden cok daha heyecanliydi."],["Emma","Really? What happened?","Sahi mi? Ne oldu?"],["Jake","On Saturday morning, my cousin called and said he was coming to visit. But he brought three friends with him.","Cumartesi sabahi kuzenim aradi ve ziyarete gelecegini soyledi. Ama yaninda uc arkadas getirdi."],["Emma","Three friends? Without telling you?","Uc arkadas mi? Sana soylemeden mi?"],["Jake","Exactly. I was shocked when I opened the door. My apartment wasn't ready for guests.","Aynen. Kapiyi acinca sok oldum. Dairem misafire hazir degildi."],["Emma","That's a nightmare.","Bu tam bir kabus."],["Jake","It felt like one. But they had already traveled for hours, so I couldn't ask them to leave. That's understandable.","Oyle hissettirdi. Ama saatlerce yol gelmislerdi, o yuzden gitmelerini isteyemedim. Bu anlasilabilir."],["Jake","I quickly cleaned the living room. Eventually, one of them washed the dishes, and another helped me organize the room.","Salonu hizla temizledim. Sonunda biri bulasiklari yikadi, digeri odayi duzenlememe yardim etti."],["Emma","That's good at least.","En azindan bu iyi."],["Jake","Then we talked about travel, technology, languages, and even space exploration. One of them was studying astronomy.","Sonra seyahat, teknoloji, diller, hatta uzay arastirmalari hakkinda konustuk. Biri astronomi okuyordu."],["Emma","Wow, that's fascinating.","Vay, bu cok buyuleyici."],["Jake","It really was. Then we decided to cook dinner together, but it was complicated. Nobody could agree on what to cook.","Gercekten oyleydi. Sonra birlikte aksam yemegi yapmaya karar verdik ama karmasikti. Kimse ne pisirecegimiz konusunda anlasamadi."],["Emma","That must have been frustrating.","Bu sinir bozucu olmus olmali."],["Jake","It was. But the meal turned out to be delicious. Sometimes simple food is the best food.","Oyleydi. Ama yemek lezzetli cikti. Bazen basit yemek en iyi yemektir."],["Emma","Did they stay overnight?","Gece kaldilar mi?"],["Jake","Yes. The next morning we discussed our future goals. One of them said something meaningful.","Evet. Ertesi sabah gelecek hedeflerimizi konustuk. Biri anlamli bir sey soyledi."],["Emma","What was it?","Neydi o?"],["Jake","He said, 'Most opportunities arrive disguised as inconveniences.'","Dedi ki, 'Cogu firsat, zorluk kiligina girmis halde gelir.'"],["Emma","That's a great quote. It fits your weekend perfectly.","Harika bir soz. Hafta sonuna tam uyuyor."],["Jake","Exactly. It became one of the most memorable weekends I've had in a long time.","Aynen. Uzun zamandir yasadigim en unutulmaz hafta sonlarindan biri oldu."]]},{"t":"Starting a New Job Abroad","tr":"Yurt Disinda Yeni Bir Ise Baslamak","lines":[["David","Good morning. Are you the HR manager?","Gunaydin. Insan kaynaklari muduru siz misiniz?"],["Sarah","Yes, I am. You must be David. Welcome to the company! How was your flight?","Evet, benim. Siz David olmalisiniz. Sirkete hos geldiniz! Ucusunuz nasildi?"],["David","It was long, but everything went smoothly. To be honest, I'm still a little nervous.","Uzundu ama her sey yolunda gecti. Acikcasi hala biraz gerginim."],["Sarah","That's completely normal. Starting a new job is stressful, and you've also moved to a new country.","Bu gayet normal. Yeni bir ise baslamak streslidir, ustelik yeni bir ulkeye de tasindiniz."],["David","Exactly. I've never lived abroad before.","Aynen. Daha once hic yurt disinda yasamamistim."],["Sarah","Well, we'll do our best to help you settle in.","Alismaniza yardimci olmak icin elimizden geleni yapacagiz."],["David","I appreciate that.","Bunu takdir ediyorum."],["Sarah","This is the main workspace. We currently have over 300 employees in this building.","Burasi ana calisma alani. Su anda bu binada 300'den fazla calisanimiz var."],["David","Wow. My previous company only had about 40 employees.","Vay. Onceki sirketimde sadece 40 kadar calisan vardi."],["Michael","Mind if I sit here? I'm Michael, from the marketing department.","Buraya oturmamin sakincasi var mi? Ben Michael, pazarlama bolumunden."],["David","Nice to meet you. I'm David.","Tanistigimiza memnun oldum. Ben David."],["Michael","So you're the new software engineer. Where are you from?","Demek yeni yazilim muhendisi sensin. Nerelisin?"],["David","I'm from Canada. My family thought moving halfway around the world was too risky.","Kanadaliyim. Ailem dunyanin obur ucuna tasinmanin cok riskli oldugunu dusunuyordu."],["Michael","And what did you think?","Peki sen ne dusundun?"],["David","I thought if I didn't take the opportunity, I might regret it for the rest of my life.","Bu firsati degerlendirmezsem hayatimin sonuna kadar pisman olabilecegimi dusundum."],["Michael","That's a good attitude.","Bu guzel bir tutum."],["Sarah","David, how are things going after three months?","David, uc ay sonra isler nasil gidiyor?"],["David","Much better than I expected. The first few weeks were difficult. There were moments when I wondered if I had made a mistake.","Bekledigimden cok daha iyi. Ilk birkac hafta zordu. Hata mi yaptim diye dusundugum anlar oldu."],["Sarah","Many people feel that way after a major life change. What changed?","Bircok insan buyuk bir yasam degisikliginden sonra boyle hisseder. Ne degisti?"],["David","Little by little, things improved. This city began to feel like home. I'm involved in significant international projects now.","Yavas yavas isler duzeldi. Bu sehir evim gibi hissettirmeye basladi. Artik onemli uluslararasi projelerde yer aliyorum."],["David","If I had stayed in my comfort zone, I would never have discovered what I was capable of achieving.","Eger konfor alanimda kalsaydim, neler basarabilecegimi asla kesfedemezdim."],["Sarah","Sometimes growth requires courage.","Bazen gelisim cesaret gerektirir."],["David","Exactly. Taking this risk was one of the best decisions I've ever made.","Aynen. Bu riski almak verdigim en iyi kararlardan biriydi."]]},{"t":"A Problem with a Hotel Reservation","tr":"Otel Rezervasyonu Sorunu","lines":[["Customer","Hi, I'm calling about my hotel reservation for this weekend.","Merhaba, bu hafta sonu icin otel rezervasyonum hakkinda ariyorum."],["Reception","Of course. Could you please give me your full name?","Tabii. Adinizi soyadinizi alabilir miyim?"],["Customer","Yes, it's Daniel Morgan. I booked a double room for two nights.","Evet, Daniel Morgan. Iki gece icin cift kisilik oda ayirtmistim."],["Reception","Let me check. Yes, I can see your booking here. You're arriving on Friday and leaving on Sunday.","Bir kontrol edeyim. Evet, rezervasyonunuzu goruyorum. Cuma geliyor, Pazar ayriliyorsunuz."],["Customer","That's right. The problem is that I just received an email saying my reservation was cancelled.","Dogru. Sorun su ki az once rezervasyonumun iptal edildigine dair bir e-posta aldim."],["Reception","I'm sorry about that. Let me look into it. Did you cancel it yourself?","Bunun icin uzgunum. Bir bakayim. Kendiniz mi iptal ettiniz?"],["Customer","No, I definitely didn't. I still need the room.","Hayir, kesinlikle etmedim. Odaya hala ihtiyacim var."],["Reception","I understand. It looks like there may have been a payment issue with the card on file.","Anliyorum. Sistemde kayitli kartla ilgili bir odeme sorunu olmus gibi gorunuyor."],["Customer","That's strange. I used the same card yesterday and it worked fine.","Bu garip. Ayni karti dun kullandim ve sorunsuz calisti."],["Reception","Sometimes the system cancels a booking automatically if the payment is not confirmed within a certain time.","Bazen odeme belli bir sure icinde onaylanmazsa sistem rezervasyonu otomatik olarak iptal eder."],["Customer","I see, but I wasn't notified before the cancellation.","Anladim ama iptalden once bilgilendirilmedim."],["Reception","You're right. You should have received a warning email first. I apologize for the inconvenience.","Haklisiniz. Once bir uyari e-postasi almaniz gerekirdi. Yasanan rahatsizlik icin ozur dilerim."],["Customer","Is it possible to restore the reservation?","Rezervasyonu geri yuklemek mumkun mu?"],["Reception","Let me check availability. Fortunately, we still have one double room available for those dates.","Musaitligi kontrol edeyim. Neyse ki o tarihler icin hala bir cift kisilik odamiz var."],["Customer","Great. Can you book it again for me?","Harika. Benim icin tekrar ayirtabilir misiniz?"],["Reception","Absolutely. I'll reactivate the reservation and send you a new confirmation email.","Kesinlikle. Rezervasyonu yeniden aktif edip size yeni bir onay e-postasi gonderecegim."],["Customer","Thank you. Will the price stay the same?","Tesekkurler. Fiyat ayni kalacak mi?"],["Reception","Yes, we'll keep the original price because the cancellation was not your fault.","Evet, iptal sizin hatactiniz olmadigi icin ilk fiyati koruyacagiz."],["Customer","I appreciate that. Could you also make sure the room is non-smoking?","Bunu takdir ediyorum. Ayrica odanin sigara icilmeyen oda oldugundan emin olabilir misiniz?"],["Reception","Of course. I've added that note to your reservation.","Tabii. Bu notu rezervasyonunuza ekledim."],["Customer","Perfect. When should I receive the confirmation?","Mukemmel. Onayi ne zaman almaliyim?"],["Reception","Within the next five minutes.","Onumuzdeki bes dakika icinde."],["Customer","Great, thank you for your help.","Harika, yardiminiz icin tesekkurler."],["Reception","You're very welcome. We look forward to welcoming you on Friday.","Rica ederim. Cuma gunu sizi agirlamayi dort gozle bekliyoruz."]]}];

const KEY="wi_v5";
let S=loadS(),cur=null,tab="study",flip=false,filt="all";
function loadS(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch{}return{l:[],r:[],s:[],si:{},st:0,ld:null,dg:10,dc:0,dd:td(),dm:false};}
function saveS(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function td(){return new Date().toISOString().split("T")[0];}
function pd(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split("T")[0];}
if(S.dd!==td()){if(S.ld!==pd())S.st=0;S.dd=td();S.dc=0;saveS();}

function pool(){
  const ls=new Set(S.l);
  const avW=CARDS.filter(c=>!ls.has(c.id)&&c.tp==="word");
  const avP=CARDS.filter(c=>!ls.has(c.id)&&c.tp==="pattern");
  // Her iki grup da bitmisse tum kartlari don
  if(!avW.length&&!avP.length)return CARDS;
  // Gruplardan biri bitmisse digerini kullan
  const srcW=avW.length?avW:CARDS.filter(c=>c.tp==="word");
  const srcP=avP.length?avP:CARDS.filter(c=>c.tp==="pattern");
  // Her gruptan esit sayida al, zorlananlari 2x ekle
  const p=[];
  for(const c of srcW){p.push(c);if(S.s.includes(c.id))p.push(c);}
  for(const c of srcP){p.push(c);if(S.s.includes(c.id))p.push(c);}
  return p;
}

function next(){
  const p=pool();
  // Kelime ve kaliplari ayir
  const words=p.filter(c=>c.tp==="word");
  const patterns=p.filter(c=>c.tp==="pattern");
  // %50 ihtimalle kelime, %50 kalip sec (her ikisi de varsa)
  let src=p;
  if(words.length&&patterns.length){
    src=Math.random()<0.5?words:patterns;
  }
  cur=src[Math.floor(Math.random()*src.length)];
  flip=false;rStudy();
}

function markL(){anim(()=>{S.l=[...new Set([...S.l,cur.id])];S.r=S.r.filter(i=>i!==cur.id);S.s=S.s.filter(i=>i!==cur.id);S.dc++;S.st=S.ld===td()?S.st:(S.ld===pd()?S.st+1:1);S.ld=td();saveS();uh();next();});}
function markR(){anim(()=>{S.r=[...new Set([...S.r,cur.id])];S.dc++;S.ld=td();saveS();uh();next();});}
function markS(){anim(()=>{S.s=[...new Set([...S.s,cur.id])];const i=((S.si[cur.id]||0)+1)%2;S.si[cur.id]=i;S.dc++;S.ld=td();saveS();uh();next();});}

function anim(fn){const w=document.getElementById("cw");if(w){w.classList.add("exit");setTimeout(fn,240);}else fn();}
function uh(){document.getElementById("sc").textContent=S.st;document.getElementById("gdb").style.display=S.dc>=S.dg?"block":"none";}
function st(t){tab=t;filt="all";document.querySelectorAll(".ni").forEach(e=>e.classList.remove("active"));const nav=document.getElementById("t-"+t);if(nav)nav.classList.add("active");window.scrollTo(0,0);render();}
function render(){if(tab==="study")rStudy();else if(tab==="learned")rList("l");else if(tab==="review")rList("r");else if(tab==="struggling")rList("s");else if(tab==="stats")rStats();else if(tab==="quiz")rQuiz();else if(tab==="dialogs")rDialogs();else if(tab==="settings")rSettings();}

function imgTag(id,cls,tp){
  const em=(tp==="pattern"?(PATTERN_EMOJI[id]||"📚"):(WORD_EMOJI[id]||"📚"));
  const fb=`this.style.display='none';this.nextElementSibling.style.display='flex';`;
  return `<img src="${ICON_BASE}${id}.png" class="${cls}" style="object-fit:cover;flex-shrink:0;" onerror="${fb}">`
    +`<div class="${cls} emojibox" style="display:none;align-items:center;justify-content:center;background:rgba(255,255,255,0.12);flex-shrink:0;">${em}</div>`;
}

// metindeki sozluk kelimelerini tiklanabilir yap
function linkWords(text){
  // uzun kelimeleri once eslemek icin uzunluga gore sirala
  const keys=Object.keys(DWORDS).sort((a,b)=>b.length-a.length);
  let result=text;
  const placeholders=[];
  keys.forEach(k=>{
    // kelime sinirlarinda, buyuk/kucuk harf duyarsiz
    const esc=k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    const re=new RegExp("\\b("+esc+")\\b","i");
    if(re.test(result)){
      const ph="\x00"+placeholders.length+"\x00";
      const orig=result.match(re)[1];
      placeholders.push(`<span class="dword" onclick="event.stopPropagation();showWord('${k.replace(/'/g,"\\'")}',event)">${orig}</span>`);
      result=result.replace(re,ph);
    }
  });
  placeholders.forEach((p,i)=>{result=result.replace("\x00"+i+"\x00",p);});
  return result;
}

let playTimer=null;
function playAll(i){
  if(!("speechSynthesis" in window))return;
  speechSynthesis.cancel();
  const d=DIALOGS[i];
  let idx=0;
  function nextLine(){
    if(idx>=d.lines.length)return;
    const u=new SpeechSynthesisUtterance(d.lines[idx][1]);
    u.lang="en-US";u.rate=0.9;
    const voices=speechSynthesis.getVoices();
    const m=voices.find(v=>v.lang.toLowerCase().startsWith("en"));
    if(m)u.voice=m;
    u.onend=()=>{idx++;nextLine();};
    speechSynthesis.speak(u);
  }
  nextLine();
}

let quizState=null;
function speak(text,lang){
  try{
    if(!("speechSynthesis" in window))return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang==="tr"?"tr-TR":"en-US";
    u.rate=lang==="tr"?1.0:0.9;
    // uygun sesi sec
    const voices=speechSynthesis.getVoices();
    const match=voices.find(v=>v.lang.toLowerCase().startsWith(lang==="tr"?"tr":"en"));
    if(match)u.voice=match;
    speechSynthesis.speak(u);
  }catch(e){console.log("TTS hata",e);}
}

function newQuiz(){
  const pool=CARDS.filter(c=>S.l.includes(c.id));
  const correct=pool[Math.floor(Math.random()*pool.length)];
  const distractPool=[];
  CARDS.forEach(c=>{if(c.id!==correct.id)distractPool.push(c.w);});
  if(correct.aw)distractPool.unshift(correct.aw,correct.aw);
  const used=new Set([correct.w.toLowerCase()]);
  const distractors=[];
  const shuffled=distractPool.sort(()=>Math.random()-0.5);
  for(const w of shuffled){
    const k=w.toLowerCase();
    if(!used.has(k)){used.add(k);distractors.push(w);}
    if(distractors.length>=3)break;
  }
  const options=[correct.w,...distractors].sort(()=>Math.random()-0.5);
  quizState={correct:correct.w,answered:false};
  document.getElementById("mc").innerHTML=`
<div class="qhead">
  <div class="stit" style="margin:0">Quiz</div>
  <div class="qscore">🎯 ${window._qscore||0} dogru</div>
</div>
<div class="qcard">
  <div class="qlbl">Bu kelimenin Ingilizcesi nedir?</div>
  <div class="qtr">${correct.tr}</div>
  <button class="qspeak" onclick="speak('${correct.tr.replace(/'/g,"\\'")}','tr')">🔊 Dinle</button>
</div>
<div class="qopts">
${options.map(o=>`<button class="qopt" onclick="answerQuiz(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join("")}
</div>
<div id="qfb"></div>`;
}
function answerQuiz(btn,choice){
  if(quizState.answered)return;
  quizState.answered=true;
  const correct=quizState.correct;
  const opts=document.querySelectorAll(".qopt");
  opts.forEach(o=>{
    o.classList.add("disabled");
    if(o.textContent===correct)o.classList.add("qright");
    else if(o===btn)o.classList.add("qwrong");
  });
  const ok=choice===correct;
  if(ok)window._qscore=(window._qscore||0)+1;
  speak(correct,"en");
  document.getElementById("qfb").innerHTML=`
<div class="qresult ${ok?"qok":"qno"}">${ok?"✅ Dogru!":"❌ Yanlis. Dogru cevap: "+correct}</div>
<button class="qnext" onclick="newQuiz()">Sonraki Soru →</button>`;
}
