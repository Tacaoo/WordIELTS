<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>WordIELTS - Erca Hoca</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0f0f13;--sf:#1a1a24;--sf2:#22222e;--bd:#2a2a38;--tx:#f0efff;--sub:#8888aa;--acc:#7c5cfc;--gr:#10b981;--am:#f59e0b;--rd:#ef4444;--nav:#13131a;}
.light{--bg:#f8f7f4;--sf:#fff;--sf2:#f0eff8;--bd:#e5e4f0;--tx:#1a1a2e;--sub:#666688;--nav:#fff;}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);background:var(--nav);position:sticky;top:0;z-index:10;}
.logo{font-size:15px;font-weight:800;background:linear-gradient(135deg,#7c5cfc,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.streak{display:flex;align-items:center;gap:4px;background:#1f1500;border:1px solid #3d2800;border-radius:20px;padding:4px 10px;font-size:13px;font-weight:700;color:#f59e0b;}
.light .streak{background:#fff7e6;border-color:#fbbf24;}
nav{display:flex;background:var(--nav);border-top:1px solid var(--bd);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:10;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px 10px;cursor:pointer;gap:3px;color:var(--sub);font-size:9px;font-weight:500;border:none;background:none;}
.ni.active{color:var(--acc);font-weight:700;}
.ni svg{width:20px;height:20px;}
main{flex:1;overflow-y:auto;padding:12px 12px 76px;}
.pb{background:var(--sf);border-radius:16px;padding:12px;margin-bottom:10px;border:1px solid var(--bd);}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.pl{font-size:11px;color:var(--sub);}
.pv{font-size:11px;font-weight:700;}
.pbar{height:6px;border-radius:99px;background:var(--sf2);overflow:hidden;margin-bottom:8px;}
.pfill{height:100%;border-radius:99px;transition:width .5s;}
.cw{perspective:1200px;margin-bottom:12px;transition:opacity .22s,transform .22s;}
.cw.exit{opacity:0;transform:scale(.94) translateY(8px);}
.ci{position:relative;height:420px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.34,1.2,.64,1);}
.ci.flip{transform:rotateY(180deg);}
.cf{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:22px;overflow:hidden;}
/* ON YUZ */
.front{display:flex;flex-direction:column;padding:14px;}
.ftop{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.fimg{width:72px;height:72px;border-radius:14px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,0.2);}
.fwb{flex:1;}
.fw{font-size:20px;font-weight:800;color:#fff;line-height:1.2;}
.ftag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-top:4px;}
.fdiv{height:1px;background:rgba(255,255,255,0.15);margin-bottom:8px;}
/* Es/Zit - on yuz */
.sarow{display:flex;gap:8px;margin-bottom:8px;}
.sabox{flex:1;border-radius:12px;padding:8px 10px;}
.syn{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);}
.ant{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);}
.salbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.slbl{color:#10b981;}
.albl{color:#ef4444;}
.saw{font-size:13px;font-weight:800;color:#fff;}
.saex{font-size:10px;color:rgba(255,255,255,0.6);font-style:italic;margin-top:2px;line-height:1.4;}
.flbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.45);margin-bottom:4px;}
.fs{font-size:12px;line-height:1.6;color:rgba(255,255,255,0.88);font-style:italic;margin-bottom:3px;}
.hint{font-size:10px;color:rgba(255,255,255,0.35);margin-top:auto;padding-top:5px;text-align:center;}
/* ARKA YUZ */
.back{transform:rotateY(180deg);background:var(--sf);border:1px solid var(--bd);display:flex;flex-direction:column;padding:16px;overflow-y:auto;gap:0;}
.bm{font-size:22px;font-weight:800;color:var(--acc);margin-bottom:10px;}
.bl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:4px;}
.be{font-size:12px;font-style:italic;color:var(--tx);line-height:1.6;}
.bt{font-size:11px;color:var(--sub);margin-bottom:7px;line-height:1.5;}
.bdv{height:1px;background:var(--bd);margin:8px 0;}
/* Butonlar */
.brow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn{border-radius:14px;padding:11px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;border:1.5px solid;outline:none;}
.bg{color:#10b981;background:#10b98118;border-color:#10b98144;}
.ba{color:#f59e0b;background:#f59e0b18;border-color:#f59e0b44;}
.br{color:#ef4444;background:#ef444418;border-color:#ef444444;}
/* Liste */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:14px;}
.sn{font-size:26px;font-weight:800;letter-spacing:-1px;}
.sl{font-size:11px;color:var(--sub);}
.wl{display:flex;flex-direction:column;gap:7px;}
.wi{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px;}
.wimg{width:36px;height:36px;border-radius:8px;object-fit:cover;}
.wen{font-weight:700;font-size:13px;}
.wtr{font-size:10px;color:var(--sub);margin-top:1px;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.empty{text-align:center;padding:40px 20px;color:var(--sub);}
.stit{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.sr{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;cursor:pointer;}
.tgl{width:42px;height:22px;border-radius:11px;position:relative;transition:background .2s;cursor:pointer;border:none;outline:none;}
.tk{position:absolute;top:2px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.gi{width:100%;padding:10px 12px;border-radius:10px;font-size:16px;font-weight:700;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);outline:none;}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.md{background:var(--sf);border-radius:20px;padding:20px;width:100%;max-width:300px;border:1px solid var(--bd);}
.mt{font-size:16px;font-weight:800;margin-bottom:12px;}
.mbs{display:flex;gap:10px;margin-top:12px;}
.mb2{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.fr{display:flex;gap:7px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.fb{padding:5px 12px;border-radius:99px;font-size:10px;font-weight:700;white-space:nowrap;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--sub);}
.fb.act{background:var(--acc);border-color:var(--acc);color:#fff;}
.gdb{font-size:10px;color:var(--gr);font-weight:700;background:#10b98118;border:1px solid #10b98133;border-radius:99px;padding:3px 8px;}
</style>
</head>

  <div class="logo">WordIELTS - Erca Hoca</div>
  <div style="display:flex;align-items:center;gap:8px;">

  </div>

  <button class="ni" onclick="st('settings')" id="t-settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 1.33 13.53M4.93 19.07a10 10 0 0 1-1.33-13.53M19.07 19.07a10 10 0 0 1-13.53 1.33M4.93 4.93a10 10 0 0 1 13.53-1.33"/></svg>Ayarlar</button>
</nav>

</div>
